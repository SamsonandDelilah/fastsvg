<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastSVG - TypeScript Client Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin-top: 10px;
            border: 1px solid #ddd;
            /* Damit man die Grenzen sieht */
        }

        p {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>

<body>

    <h1>⚡ FastSVG - Pure Client-Side Test</h1>
    <p>Diese Bilder werden ohne Server direkt von der TypeScript/JS-Funktion berechnet:</p>

    <div class="grid">
        <!-- Box 1: Standard -->
        <div class="card">
            <p>1. Standard (300x200)</p>
            <div id="box1"></div>
        </div>

        <!-- Box 2: Blau/Weiß -->
        <div class="card">
            <p>2. Blaues Design</p>
            <div id="box2"></div>
        </div>

        <!-- Box 3: Orange mit Custom Text -->
        <div class="card">
            <p>3. Custom Text & Farbe</p>
            <div id="box3"></div>
        </div>
    </div>

    <script>
        function getSvgPlaceholder(size, options = {}) {
            let width = 300;
            let height = 200;

            if (size.toLowerCase().includes('x')) {
                const [w, h] = size.toLowerCase().split('x');
                width = parseInt(w, 10) || 300;
                height = parseInt(h, 10) || 200;
            } else {
                const s = parseInt(size, 10) || 300;
                width = s;
                height = s;
            }

            const hexRegex = /^([A-Fa-f0-9]{3}|[A-Fa-f0-9]{6})$/;

            // Nutze Standard-Hexcodes mit echtem '#' für das SVG
            const bg = options.bg && hexRegex.test(options.bg) ? `#${options.bg}` : '#eeeeee';
            const textColor = options.textColor && hexRegex.test(options.textColor) ? `#${options.textColor}` : '#aaaaaa';
            const displayText = options.text || `${width} x ${height}`;

            const fontSize = Math.max(12, Math.min(width, height) * 0.08);

            // Verwende einfache statt doppelte Anführungszeichen im SVG-Code
            const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${width}' height='${height}' viewBox='0 0 ${width} ${height}'>` +
                `<rect width='100%' height='100%' fill='${bg}'/>` +
                `<text x='50%' y='50%' font-family='Arial, sans-serif' font-size='${fontSize}px' fill='${textColor}' dominant-baseline='middle' text-anchor='middle'>` +
                `${displayText}` +
                `</text></svg>`;

            // WICHTIG: Das SVG wird hier browserunabhängig in eine sichere Base64-Zeichenkette verpackt
            const base64Svg = btoa(unescape(encodeURIComponent(svg)));
            return `data:image/svg+xml;base64,${base64Svg}`;
        }

        // HTML-Boxen mit Grafiken befüllen
        document.getElementById('box1').innerHTML = `<img src="${getSvgPlaceholder('300x200')}" />`;
        document.getElementById('box2').innerHTML = `<img src="${getSvgPlaceholder('300x200', { bg: '0055ff', textColor: 'ffffff' })}" />`;
        document.getElementById('box3').innerHTML = `<img src="${getSvgPlaceholder('300x200', { bg: 'ff5500', textColor: 'ffffff', text: 'Hallo Welt!' })}" />`;
    </script>



</body>

</html>
